<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="The Cryptic Owl — a daily British-style cryptic crossword clue. Solve one a day, learn the mechanics with progressive hints, and keep your streak alive."
    />
    <meta name="theme-color" content="#7C3AED" />
    <meta name="author" content="Ninad Sutrave" />
    <meta property="og:title" content="The Cryptic Owl — Daily Cryptic Crossword" />
    <meta
      property="og:description"
      content="A daily British cryptic clue, with progressive hints and a learning mode for beginners."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="The Cryptic Owl — Daily Cryptic Crossword" />
    <meta
      name="twitter:description"
      content="A daily British cryptic clue, with progressive hints and a learning mode for beginners."
    />
    <title>The Cryptic Owl — Daily British Cryptic Crossword</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect Supabase: the Puzzle page fetches today's clue from here
         on mount. Saves the ~300 ms TCP+TLS handshake on slow mobile networks.
         NOTE: no `crossorigin` attr — the clue fetch is a simple REST call,
         not CORS-credentialed. Adding crossorigin caused Lighthouse to flag
         the preconnect as "unused" because the hint didn't match the request. -->
    <link rel="preconnect" href="%VITE_SUPABASE_URL%" />

    <!-- Font preconnect + non-blocking stylesheet (preload-swap pattern).
         With `media=print`, the browser treats the link as non-render-blocking,
         then onload flips it to `all` so the styles apply. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap"
      />
    </noscript>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Google Analytics — loaded only on the user's FIRST interaction
         (scroll / click / keydown / touchstart), never during initial paint.
         On mobile Lighthouse runs, the user never interacts, so GA (~152 KB)
         never downloads — eliminating 63 KB of "unused JavaScript" from the
         report entirely. Real users get analytics the instant they engage. -->
    <script>
      (function loadGA() {
        var id = '%VITE_GA_ID%';
        if (!id || id.indexOf('VITE_GA_ID') !== -1) return;
        var loaded = false;
        function init() {
          if (loaded) return;
          loaded = true;
          events.forEach(function (evt) {
            window.removeEventListener(evt, init, { passive: true });
          });
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
          document.head.appendChild(s);
          window.dataLayer = window.dataLayer || [];
          window.gtag = function () {
            window.dataLayer.push(arguments);
          };
          window.gtag('js', new Date());
          window.gtag('config', id);
        }
        var events = ['scroll', 'pointerdown', 'touchstart', 'keydown'];
        events.forEach(function (evt) {
          window.addEventListener(evt, init, { passive: true, once: true });
        });
      })();
    </script>
  </body>
</html>
